server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets estáticos
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        image/svg+xml;

    # Cache para assets com hash no nome (gerados pelo Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy para o backend — remove o prefixo /api antes de encaminhar
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts adequados para operações mais demoradas
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # SPA routing — rotas não encontradas entregam o index.html para o Vue Router resolver
    location / {
        try_files $uri $uri/ /index.html;
    }
}